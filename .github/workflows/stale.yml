name: Stale

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 14
          days-before-issue-close: 7
          days-before-pr-stale: 7
          days-before-pr-close: 5
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: enhancement,pinned,security,no-stale
          exempt-pr-labels: pinned,no-stale
          remove-stale-when-updated: true
          stale-issue-message: |
            This issue has been automatically marked as stale due to inactivity.
            Please add updates or it will be closed.
          stale-pr-message: |
            This pull request has been automatically marked as stale due to inactivity.
            Please add updates or it will be closed.
          close-issue-message: |
            Closing due to inactivity. If this is still relevant, please open a new issue with updated details.
          close-issue-reason: not_planned
          close-pr-message: |
            Closing due to inactivity. If this PR should be revived, please reopen with updated context.
